version: '3'
services:
  frontend:
    container_name: react-frontend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://35.216.67.162:8080
    depends_on:
      - backend

  backend:
    container_name: spring-backend
    build:
      context: ./
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - GCP_BUCKET=formidable-card-451902-bucket
      - GCP_PROJECT_ID=formidable-card-451902
      - GCP_CREDENTIALS_PATH=/app/credentials/service-key.json
      - DB_PWD=yse96519@
      - SMTP_PWD=hwkztzudddcidzox
    volumes:
      - ./service-key.json:/app/credentials/service-key.json:ro

  nginx:
    container_name: nginx-proxy
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
